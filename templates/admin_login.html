{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 text-center">
        <h3>Admin Login</h3>
        <form method="POST">
            <input type="password" name="password" class="form-control mb-3 mt-3" placeholder="Password" required>
            <button type="submit" class="btn btn-dark w-100">Unlock Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
