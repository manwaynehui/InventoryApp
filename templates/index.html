{% extends 'base.html' %}
{% block content %}
<h2>Inventory Search</h2>
<form action="/" method="get" class="mb-4 d-flex gap-2">
    <input type="text" name="search" class="form-control" placeholder="Search products...">
    <button type="submit" class="btn btn-primary">Search</button>
</form>
<table class="table">
    <thead><tr><th>Description</th><th>Price</th><th>Stock</th><th>Qty</th><th>Action</th></tr></thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.description }}</td>
            <td>${{ "%.2f"|format(p.price) }}</td>
            <td>{{ p.in_stock }}</td>
            <form action="/add_to_cart/{{ p.id }}" method="POST">
                <td><input type="number" name="quantity" value="1" min="1" max="{{ p.in_stock }}" class="form-control" style="width:80px;"></td>
                <td><button type="submit" class="btn btn-success btn-sm">Add</button></td>
            </form>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
